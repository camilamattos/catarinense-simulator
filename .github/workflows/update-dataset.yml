name: Update Dataset

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

jobs:
  update:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Update dataset
        run: uv run python src/league_simulator/tools/update_dataset.py

      - name: Generate dashboard
        run: uv run python src/league_simulator/main.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add datasets/

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Automatic dataset update"
            git push
          fi
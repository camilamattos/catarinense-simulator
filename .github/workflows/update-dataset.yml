name: Update Dataset

on:
  workflow_dispatch:

  schedule:
    # Quarta, sábado e domingo
    # Horários em UTC (Brasília = UTC-3)
    #
    # 19:50 UTC -> 16:50 BRT
    # 20:50 UTC -> 17:50 BRT
    # 21:50 UTC -> 18:50 BRT
    # 23:50 UTC -> 20:50 BRT
    # 00:20 UTC -> 21:20 BRT (dia seguinte)
    - cron: "50 19 * * 3,6,0"
    - cron: "50 20 * * 3,6,0"
    - cron: "50 21 * * 3,6,0"
    - cron: "50 23 * * 3,6,0"
    - cron: "20 0 * * 4,0,1"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Update dataset
        run: uv run python src/league_simulator/tools/update_dataset.py

      - name: Generate dashboard
        run: uv run python src/league_simulator/cli.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Automatic dataset update"
          git push